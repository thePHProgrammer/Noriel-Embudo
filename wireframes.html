<html lang="en">

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>

<body>
<script type="text/babel">

// ─── color tokens ───────────────────────────────────────────
const C = {
  space: '#08090F',
  spaceMid: '#12141E',
  star: '#F5F0E8',
  gold: '#F59E0B',
  orange: '#F97316',
  dim: '#3A3B4A',
  wire: '#D1C8B8',
  ink: '#2A2418',
  annot: '#7C6A50',
};

// ─── tiny helpers ────────────────────────────────────────────
const Sketch = ({ w, h, children, style = {} }) => (
  <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{ display: 'block', ...style }}>
    {children}
  </svg>
);

const SketchBox = ({ x, y, w, h, fill = 'none', stroke = C.wire, dash = false, r = 2 }) => (
  <rect x={x} y={y} width={w} height={h} rx={r} fill={fill}
    stroke={stroke} strokeWidth={1.5} strokeDasharray={dash ? '5 3' : undefined} />
);

const SketchCircle = ({ cx, cy, r, fill = 'none', stroke = C.wire, glow }) => (
  <>
    {glow && <circle cx={cx} cy={cy} r={r + 6} fill="none" stroke={C.gold} strokeWidth={1} opacity={0.2} />}
    <circle cx={cx} cy={cy} r={r} fill={fill} stroke={stroke} strokeWidth={1.5} />
  </>
);

const Note = ({ x, y, text, size = 11, color = C.gold, anchor = 'start' }) => (
  <text x={x} y={y} fontFamily="Caveat, cursive" fontSize={size} fill={color} textAnchor={anchor}>{text}</text>
);

const Label = ({ x, y, text, size = 10, color = C.wire, anchor = 'start', bold }) => (
  <text x={x} y={y} fontFamily="Space Mono, monospace" fontSize={size} fill={color}
    textAnchor={anchor} fontWeight={bold ? 700 : 400}>{text}</text>
);

const Stars = ({ w, h, count = 40, seed = 1 }) => {
  const pts = [];
  let s = seed;
  for (let i = 0; i < count; i++) {
    s = (s * 9301 + 49297) % 233280;
    const x = (s / 233280) * w;
    s = (s * 9301 + 49297) % 233280;
    const y = (s / 233280) * h;
    const r = i % 5 === 0 ? 1.2 : 0.6;
    pts.push(<circle key={i} cx={x} cy={y} r={r} fill={C.star} opacity={0.6 + (i % 3) * 0.15} />);
  }
  return <>{pts}</>;
};

// ─── TAB CONTROL ─────────────────────────────────────────────
const TABS = ['Option A — Vertical Flythrough', 'Option B — Orbital Timeline', 'Option C — Big Bang Radial'];

// ─── WIREFRAME OPTION A ─ Vertical scroll flythrough ─────────
// User scrolls down; camera flies through space; each section = planet encounter
function WireA() {

        <rect width={W} height={H} fill={C.space} />
        <Stars w={W} h={H} count={60} seed={42} />

        {/* ── SCREEN 1: Big Bang ── */}

        <circle cx={190} cy={90} r={30} fill="none" stroke={C.gold} strokeWidth={1} opacity={0.25} />
        <circle cx={190} cy={90} r={14} fill={C.gold} opacity={0.9} />
        {/* burst rays */}
        {[0,30,60,90,120,150,180,210,240,270,300,330].map((a,i) => {
          const rad = a * Math.PI / 180;
          return <line key={i}
            x1={190 + Math.cos(rad)*14} y1={90 + Math.sin(rad)*14}
            x2={190 + Math.cos(rad)*38} y2={90 + Math.sin(rad)*38}

        <Note x={190} y={155} text="BIG BANG → origin point" size={13} anchor="middle" />
        <Note x={190} y={172} text="NORIEL JOY EMBUDO" size={15} color={C.star} anchor="middle" />

        <line x1={195} y1={210} x2={190} y2={215} stroke={C.gold} strokeWidth={1.5} />

        {/* asteroid belt visual */}
        {[0,1,2,3,4,5,6,7,8].map(i => {
          const x = 50 + i * 32, y = 390 + (i % 2 === 0 ? -5 : 5);
          const r = i % 3 === 0 ? 7 : 4;
          return <circle key={i} cx={x} cy={y} r={r} fill={C.dim} stroke={C.wire} strokeWidth={1} opacity={0.8} />;
        })}
        <Label x={190} y={410} text="Python · n8n · UiPath · AWS · C# ..." size={8} color={C.wire} anchor="middle" />
        <Label x={190} y={422} text="floating skill tags around belt" size={8} color={C.annot} anchor="middle" />

        {/* ── SECTION: EXPERIENCE (large planets) ── */}
        <Note x={30} y={448} text="EXPERIENCE" size={11} color={C.gold} />
        {/* 3 planets */}
        <SketchCircle cx={70} cy={475} r={22} fill={C.spaceMid} stroke={C.orange} glow />
        <Label x={70} y={479} text="CUP" size={8} color={C.gold} anchor="middle" />
        <SketchCircle cx={135} cy={480} r={16} fill={C.spaceMid} stroke={C.wire} />

        <Label x={288} y={486} text="[ company · dates ]" size={8} color={C.dim} anchor="middle" />
        <Label x={288} y={498} text="[ bullet achievements ]" size={8} color={C.dim} anchor="middle" />

        {/* ── SECTION: PROJECTS ── */}
        <Note x={30} y={520} text="PROJECTS" size={11} color={C.gold} />
        <SketchCircle cx={75} cy={548} r={20} fill={C.spaceMid} stroke={C.gold} />
        <Label x={75} y={546} text="Sirena" size={7} color={C.gold} anchor="middle" />
        <Label x={75} y={556} text="Tech" size={7} color={C.gold} anchor="middle" />
        <SketchCircle cx={130} cy={550} r={15} fill={C.spaceMid} stroke={C.wire} />
        <Label x={130} y={554} text="EWO" size={7} color={C.wire} anchor="middle" />
        <Label x={200} y={540} text="click planet →" size={9} color={C.annot} />
        <Label x={200} y={552} text="expands project card" size={9} color={C.annot} />
        <Label x={200} y={564} text="inline below" size={9} color={C.annot} />

        {/* ── SECTION: CONTACT ── */}
        <Note x={30} y={590} text="CONTACT" size={11} color={C.gold} />
        <Label x={60} y={610} text="embudon@gmail.com" size={8} color={C.wire} />
        <Label x={60} y={622} text="Quezon City, PH" size={8} color={C.wire} />
        {/* resume button */}
        <SketchBox x={60} y={628} w={100} h={20} r={10} stroke={C.gold} />
        <Label x={110} y={642} text="↓ RESUME PDF" size={8} color={C.gold} anchor="middle" />

        {/* flight path line */}
        <path d={`M 30 90 Q 20 240 50 295 Q 20 390 50 460 Q 20 548 50 590`}
          fill="none" stroke={C.gold} strokeWidth={0.8} strokeDasharray="3 5" opacity={0.4} />

        {/* border */}
        <rect width={W} height={H} fill="none" stroke={C.dim} strokeWidth={1} />
      </Sketch>
    </DCArtboard>
  );
}

// ─── WIREFRAME OPTION C ─ Big Bang Radial ────────────────────
// All content radiates OUT from a central big bang point.
// Scroll = zoom out to reveal more of the universe.
// Sections on radial arms, like a galaxy map.
function WireC() {
  const W = 700, H = 700;
  const cx = 350, cy = 360;

  // section arms at different angles
  const sections = [
    { label: 'ABOUT',      angle: -80,  dist: 150, r: 28, color: C.orange },
    { label: 'EDUCATION',  angle: -20,  dist: 180, r: 24, color: C.wire },
    { label: 'SKILLS',     angle: 35,   dist: 170, r: 32, color: C.wire },
    { label: 'EXPERIENCE', angle: 100,  dist: 200, r: 40, color: C.orange, ring: true },
    { label: 'PROJECTS',   angle: 155,  dist: 175, r: 30, color: C.gold },
    { label: 'BLOG',       angle: 205,  dist: 160, r: 20, color: C.dim },
    { label: 'CONTACT',    angle: 255,  dist: 190, r: 22, color: C.gold },
  ];

  return (
    <DCArtboard label="Option C — Big Bang Radial (scroll out to reveal the full universe)" width={W} height={H}>
      <Sketch w={W} h={H}>
        <rect width={W} height={H} fill={C.space} />
        <Stars w={W} h={H} count={90} seed={13} />

        {/* outer glow rings */}
        {[260, 220, 180].map(r => (
          <circle key={r} cx={cx} cy={cy} r={r} fill="none" stroke={C.gold} strokeWidth={0.5} opacity={0.06} />
        ))}

        {/* arms from center */}
        {sections.map((s, i) => {
          const rad = s.angle * Math.PI / 180;
          const px = cx + Math.cos(rad) * s.dist;
          const py = cy + Math.sin(rad) * s.dist;
          return (
            <line key={i}
              x1={cx} y1={cy}
              x2={px} y2={py}
              stroke={C.dim} strokeWidth={0.8} strokeDasharray="4 4" />
          );
        })}

        {/* section planets */}
        {sections.map((s, i) => {
          const rad = s.angle * Math.PI / 180;
          const px = cx + Math.cos(rad) * s.dist;
          const py = cy + Math.sin(rad) * s.dist;
          // label direction
          const lx = px + Math.cos(rad) * (s.r + 18);
          const ly = py + Math.sin(rad) * (s.r + 12);
          const anchor = lx < cx - 20 ? 'end' : lx > cx + 20 ? 'start' : 'middle';
          return (
            <g key={i}>
              {s.ring && (
                <ellipse cx={px} cy={py} rx={s.r + 14} ry={s.r * 0.35}
                  fill="none" stroke={s.color} strokeWidth={1} opacity={0.35}
                  transform={`rotate(${s.angle}, ${px}, ${py})`} />
              )}
              <circle cx={px} cy={py} r={s.r} fill={C.spaceMid} stroke={s.color} strokeWidth={1.5} />
              <Note x={lx} y={ly} text={s.label} size={11} color={s.color} anchor={anchor} />
            </g>
          );
        })}

        {/* ── CENTER: Big Bang / Sun ── */}
        {[55, 40, 28, 18].map((r, i) => (
          <circle key={r} cx={cx} cy={cy} r={r} fill="none" stroke={C.gold} strokeWidth={1}
            opacity={[0.08, 0.12, 0.25, 0.6][i]} />
        ))}
        <circle cx={cx} cy={cy} r={12} fill={C.gold} />
        <Label x={cx} y={cy + 4} text="NJE" size={9} color={C.space} anchor="middle" bold />

        {/* name block */}
        <Note x={cx} y={cy - 75} text="NORIEL JOY EMBUDO" size={16} color={C.star} anchor="middle" />
        <Label x={cx} y={cy - 55} text="AUTOMATION SOFTWARE ENGINEER" size={8} color={C.annot} anchor="middle" />

        {/* expanded card example for EXPERIENCE */}
        {(() => {
          const s = sections[3]; // EXPERIENCE
          const rad = s.angle * Math.PI / 180;
          const px = cx + Math.cos(rad) * s.dist;
          const py = cy + Math.sin(rad) * s.dist;
          return (
            <g>
              <SketchBox x={px + s.r + 8} y={py - 40} w={160} h={90} dash r={4} />
              <Label x={px + s.r + 88} y={py - 26} text="[ click to expand ]" size={7} color={C.dim} anchor="middle" />
              <Label x={px + s.r + 88} y={py - 14} text="CUP · Jan 2026–Now" size={7} color={C.gold} anchor="middle" />
              <Label x={px + s.r + 88} y={py}     text="DFI · Aug 2024–Jan 2026" size={7} color={C.wire} anchor="middle" />
              <Label x={px + s.r + 88} y={py + 12} text="FactSet · Apr–Jul 2024" size={7} color={C.wire} anchor="middle" />
              <Label x={px + s.r + 88} y={py + 28} text="100k+ hrs automated" size={7} color={C.orange} anchor="middle" />
              <Label x={px + s.r + 88} y={py + 42} text="↑ detail panel slides in" size={7} color={C.annot} anchor="middle" />
            </g>
          );
        })()}

        {/* scroll hint */}
        <Note x={cx} y={H - 20} text="scroll out → universe expands → reveals more sections" size={11} color={C.annot} anchor="middle" />

        {/* resume btn */}
        <SketchBox x={cx - 55} y={H - 55} w={110} h={24} r={12} stroke={C.gold} />
        <Label x={cx} y={H - 39} text="↓ DOWNLOAD RESUME" size={8} color={C.gold} anchor="middle" />

        <rect width={W} height={H} fill="none" stroke={C.dim} strokeWidth={1} />
      </Sketch>
    </DCArtboard>
  );
}

// ─── ANNOTATIONS ─────────────────────────────────────────────
function Annotations() {
  return (
    <>
      <DCPostIt top={10} left={10} rotate={-1} width={200}>
        <b>Option A:</b> Classic scroll-down journey. Simplest to build. Each section feels like landing on a planet.
      </DCPostIt>
      <DCPostIt top={10} left={430} rotate={1} width={220}>
        <b>Option B:</b> Timeline as spaceflight. Best for showing career progression. Works great with the "fly through time" idea.
      </DCPostIt>
      <DCPostIt top={10} left={1370} rotate={-2} width={200}>
        <b>Option C:</b> Most dramatic. Full galaxy map. Best "big bang" visual metaphor. More complex UX.
      </DCPostIt>
      <DCPostIt top={430} left={10} rotate={2} width={185}>
        💡 Can mix: B layout + A planet detail panels
      </DCPostIt>
    </>
  );
}

// ─── APP ──────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = React.useState(1); // B is the recommended default

  return (
    <div style={{ width: '100vw', height: '100vh', display: 'flex', flexDirection: 'column' }}>
      {/* tab bar */}
      <div style={{
        display: 'flex', gap: 0, background: '#1A1B26', zIndex: 10,
        borderBottom: '1px solid #2A2B36', padding: '0 16px',
      }}>
        {TABS.map((t, i) => (
          <button key={i} onClick={() => setTab(i)} style={{
            background: tab === i ? '#2A2B36' : 'transparent',
            border: 'none', borderBottom: tab === i ? `2px solid ${C.gold}` : '2px solid transparent',
            color: tab === i ? C.star : C.annot,
            fontFamily: 'Space Mono, monospace', fontSize: 11, padding: '10px 18px',
            cursor: 'pointer', transition: 'all 0.15s',
          }}>{t}</button>
        ))}
        <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center',
          fontFamily: 'Caveat, cursive', fontSize: 14, color: C.annot, paddingRight: 8 }}>
          drag to pan · scroll to zoom
        </div>
      </div>

      {/* canvas */}
      <div style={{ flex: 1, overflow: 'hidden' }}>
        <DesignCanvas>
          {tab === 0 && (
            <DCSection title="Option A — Vertical Flythrough" subtitle="Classic top-to-bottom scroll. Big Bang intro → fly past each section as a planet. Most familiar pattern.">
              <WireA />
              <DCPostIt top={60} left={420} rotate={2} width={220}>
                <b>Big Bang</b> plays on load → particles form title. Then user scrolls down to "travel through time."
              </DCPostIt>
              <DCPostIt top={260} left={420} rotate={-1} width={200}>
                Flight path line traces your journey. Each planet = a section. Click = zoom in for detail.
              </DCPostIt>
            </DCSection>
          )}
          {tab === 1 && (
            <DCSection title="Option B — Horizontal Orbital Timeline ★ Recommended" subtitle="Scroll left→right through your career timeline. Each milestone is a planet on the flight path. Most cinematic — like Interstellar wormhole travel.">
              <WireB />
              <Annotations />
            </DCSection>
          )}
          {tab === 2 && (
            <DCSection title="Option C — Big Bang Radial Galaxy Map" subtitle="You are the sun. All sections orbit outward like a galaxy. Scroll = zoom out and reveal more of the universe. Most dramatic.">
              <WireC />
              <DCPostIt top={60} left={740} rotate={1} width={210}>
                <b>Opening:</b> Only the center glows. Scroll out → arms of the galaxy slowly materialize with particle trails.
              </DCPostIt>
              <DCPostIt top={300} left={740} rotate={-1} width={195}>
                Detail panels slide in from the side when you click a planet. Resume download at outer edge.
              </DCPostIt>
            </DCSection>
          )}
        </DesignCanvas>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
<div id="root"></div>
</body>
</html>
